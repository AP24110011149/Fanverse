<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Final Preview — FanVerse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .preview-container {
            max-width: 600px;
            margin: 60px auto;
            text-align: center;
            background: rgba(30, 30, 40, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .preview-img-wrap {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            height: 350px;
            margin-bottom: 24px;
        }

        .preview-img-wrap img {
            max-width: 48%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <script src="js/auth.js"></script>

    <nav class="navbar" id="navbar">
        <div class="nav-inner">
            <a href="products.html" class="logo">FanVerse</a>
            <div class="nav-links">
                <a href="products.html">Shop</a>
                <a href="customize.html">Customize</a>
                <a href="cart.html">Cart</a>
                <a href="community.html">Community</a>
                <a href="fan-edition.html" style="color:var(--pink-light);">🔥 Fan Edition</a>
                <a href="rainbow-deal.html" class="nav-link" id="nav-rainbow" style="background:-webkit-linear-gradient(left, #8b5cf6, #3b82f6, #10b981, #eab308, #ef4444); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-weight:900;">🌈 Deal</a>
                <a href="help.html">Help</a>
            </div>
            <div class="nav-right">
                <a href="cart.html" class="cart-btn">🛒 Cart<span class="cart-badge" style="display:none">0</span></a>
            </div>
        </div>
    </nav>

    <section class="section-pad" style="margin-top: 60px;">
        <div class="container">
            <div class="preview-container">
                <h1 style="font-family:'Outfit', sans-serif; font-weight:800; font-size:2.5rem; margin-bottom:10px;">
                    Final Preview</h1>
                <p style="color:var(--text-muted); margin-bottom: 30px;">Review your custom masterpiece before adding to
                    cart.</p>

                <div class="preview-img-wrap" id="img-container">
                    <img id="preview-img-front" src="" alt="Front View" />
                    <img id="preview-img-back" src="" alt="Back View" style="display:none;" />
                </div>

                <h2 id="preview-name" style="font-size:1.5rem; margin-bottom:8px; font-weight:700;">Loading...</h2>
                <div id="preview-meta" style="color:var(--text-muted); font-size:0.9rem; margin-bottom:15px;"></div>
                <div id="preview-price" style="font-size:1.6rem; font-weight:800; color:#22c55e; margin-bottom:30px;">₹0
                </div>

                <div style="display:flex; justify-content:center; gap:16px;">
                    <button class="btn btn-outline" onclick="goBack()">← Back to Edit</button>
                    <button class="btn btn-primary" onclick="confirmCart()">✅ Confirm & Add to Cart</button>
                </div>
            </div>
        </div>
    </section>

    <div class="toast-container"></div>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pending = JSON.parse(localStorage.getItem('pending_customization'));
            if (!pending) {
                window.location.href = 'customize.html';
                return;
            }

            if (pending.imgBack && pending.imgBack !== pending.imgFront) {
                document.getElementById('preview-img-front').src = pending.imgFront || pending.img || 'img/tshirt_black.png';
                document.getElementById('preview-img-back').src = pending.imgBack || 'img/tshirt_black.png';
                document.getElementById('preview-img-back').style.display = 'block';
            } else {
                document.getElementById('preview-img-front').src = pending.imgFront || pending.img || 'img/tshirt_black.png';
            }

            document.getElementById('preview-name').textContent = pending.name;
            document.getElementById('preview-meta').textContent = pending.meta;
            document.getElementById('preview-price').textContent = `₹${parseFloat(pending.price || 0).toLocaleString('en-IN')}`;
        });

        function confirmCart() {
            const pending = JSON.parse(localStorage.getItem('pending_customization'));
            if (!pending) return;

            let cart = JSON.parse(localStorage.getItem('fanverse_cart') || '[]');
            const urlParams = new URLSearchParams(window.location.search);
            const isEdit = urlParams.get('edit') === 'true';

            if (isEdit) {
                cart = cart.filter(i => i.id !== pending.id); // Remove old one if editing
            }

            cart.push(pending);
            try {
                localStorage.setItem('fanverse_cart', JSON.stringify(cart));
            } catch (e) {
                console.error('Storage limit exceeded, clearing old items:', e);
                cart = [pending];
                localStorage.setItem('fanverse_cart', JSON.stringify(cart));
                if (window.showToast) showToast('Storage full! Cleared old cart to add new item.', 'error');
            }

            localStorage.removeItem('pending_customization');

            if (window.updateCartBadge) updateCartBadge();
            if (window.showToast) showToast('Added to Cart!');

            setTimeout(() => window.location.href = 'cart.html', 800);
        }

        function goBack() {
            const pending = JSON.parse(localStorage.getItem('pending_customization'));
            if (pending && pending.id) {
                window.location.href = 'customize.html?edit=' + pending.id;
            } else {
                window.location.href = 'customize.html';
            }
        }
    </script>
</body>

</html>
